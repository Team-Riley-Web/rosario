[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Products added in Shopify after the last build have no static page yet
# (rebuilt daily by the rebuild-on-product-changes workflow). Send those to
# the shop page instead of letting the catch-all serve the homepage.
# Netlify skips this rule when a real /products/<handle> page exists.
[[redirects]]
  from = "/products/*"
  to = "/shop"
  status = "302"

[[redirects]]
  from = "/discount/*"
  to = "/discount/index.html"
  status = "200"

[[redirects]]
  from = "/:discount_code"
  to = "/discount/index.html"
  status = "200"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = "200"
